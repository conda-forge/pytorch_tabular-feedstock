{% set name = "pytorch_tabular" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 1b96b576eb3de443840b313d0b298293eaf83dcfdbba53ed8974b76d1351b821

build:
  number: 0

outputs:
  - name: {{ name }}
    build:
      script: python -m pip install --no-deps --no-build-isolation -vv .
      noarch: python
    requirements:
      host:
        - python {{ python_min }}
        - setuptools
        - pip
      run:
        - python >={{ python_min }}
        - pytorch >=1.11.0
        - numpy <=3.0.0
        - pandas >=1.1.5,<3.0.0
        - scikit-learn >=1.3.0,<2.0
        - pytorch-lightning >=2.0.0,<2.7.0
        - scipy >=1.8,<2.0
        - omegaconf >=2.3.0
        - torchmetrics >=0.10.0,<1.9.0
        - einops >=0.6.0,<0.9.0
        - rich >=11.0.0
        - scikit-base

    test:
      imports:
        - pytorch_tabular
      commands:
        - pip check
      requires:
        - python {{ python_min }}
        - pip

  - name: pytorch-tabular
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage(name, exact=True) }}
    test:
      requires:
        - python {{ python_min }}
      imports:
        - pytorch_tabular

about:
  home: https://github.com/manujosephv/pytorch_tabular
  summary: A standard framework for using Deep Learning for tabular data
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - manujosephv
    - cheginit
